name: Mobile Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to submit'
        type: choice
        default: all
        options:
          - all
          - ios
          - android

jobs:
  submit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Decode Play Store service account
        if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
        env:
          PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_SA_JSON" | base64 -d > play-service-account.json

      - name: EAS submit
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: eas submit --profile production --platform ${{ inputs.platform || 'all' }} --latest --non-interactive
