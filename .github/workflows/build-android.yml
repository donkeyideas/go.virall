name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build (Android)
        run: eas build --profile ${{ inputs.profile || 'preview' }} --platform android --non-interactive

      - name: Download .aab from EAS
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | npx -y node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const b=JSON.parse(d);
              console.log(b[0]?.artifacts?.buildUrl||'');
            })
          ")
          if [ -n "$BUILD_URL" ]; then
            curl -L -o go-virall.aab "$BUILD_URL"
          else
            echo "No build URL found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-virall-android
          path: mobile/go-virall.aab
          retention-days: 90
