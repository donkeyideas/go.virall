name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Write Android keystore (production only)
        if: ${{ inputs.profile == 'production' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./release.keystore
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "release.keystore",
                "keystorePassword": "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.ANDROID_KEY_ALIAS }}",
                "keyPassword": "${{ secrets.ANDROID_KEY_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Build Android (production → AAB)
        if: ${{ inputs.profile == 'production' }}
        run: eas build --local --profile production --platform android --non-interactive --output ./go-virall.aab

      - name: Build Android (preview/dev → APK)
        if: ${{ inputs.profile != 'production' }}
        run: eas build --local --profile ${{ inputs.profile || 'preview' }} --platform android --non-interactive --output ./go-virall.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-virall-android
          path: |
            apps/mobile/go-virall.aab
            apps/mobile/go-virall.apk
          retention-days: 90
