name: Build iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build (iOS)
        run: eas build --profile ${{ inputs.profile || 'preview' }} --platform ios --non-interactive

      - name: Submit to App Store
        if: ${{ inputs.profile == 'production' }}
        run: eas submit --profile production --platform ios --latest --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
