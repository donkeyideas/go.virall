name: Build iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build iOS locally (preview/dev → IPA)
        if: ${{ inputs.profile != 'production' }}
        run: eas build --local --profile ${{ inputs.profile || 'preview' }} --platform ios --non-interactive --output ./go-virall.ipa

      - name: Build iOS locally (production → IPA)
        if: ${{ inputs.profile == 'production' }}
        run: eas build --local --profile production --platform ios --non-interactive --output ./go-virall.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-virall-ios
          path: apps/mobile/go-virall.ipa
          retention-days: 90

      - name: Submit to App Store (production only)
        if: ${{ inputs.profile == 'production' }}
        run: eas submit --profile production --platform ios --path ./go-virall.ipa --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
